name: Destroy Crackling-AWS

on:
  workflow_dispatch:
    inputs:
      confirm_destroy:
        description: "Type 'yes' to confirm destruction of the Crackling-AWS stack. All data will be permanently deleted. Be sure to check that the variable `AWS_STACK_NAME` is correctly set."
        required: true
        default: "no"

jobs:
  Destroy_CracklingAws:
    if: ${{ github.event.inputs.confirm_destroy == 'yes' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v3
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Update build environment
        run: 'sudo apt update'

      - name: Setup Node.js 24
        uses: actions/setup-node@v3
        with:
          node-version: '24'

      - name: Install AWS CDK
        run: 'sudo npm install -g aws-cdk'

      - name: Install Requirements 
        run: 'pip3 install -r aws/requirements.txt'
  
      - name: Create Lambda layer with NCBI dependency
        run: 'mkdir -p layers/ncbi/python && python3 -m pip install --target layers/ncbi/python -r layers/requirements_ncbi.txt'

      - name: Create Lambda layer with requests dependency
        run: 'mkdir -p layers/requestsPy310Pkgs/python && python3 -m pip install --target layers/requestsPy310Pkgs/python -r layers/requirements_requests.txt'

      - name: Create Lambda layer with lib dependencies (1/2)
        run: "ldd layers/isslScoreOfftargets/isslScoreOfftargets | grep \"=> /\" | awk '{print $3}' | xargs -I '{}' cp -v '{}' layers/sharedObjects"

      - name: Create Lambda layer with lib dependencies (2/2)
        run: "ldd layers/rnaFold/rnaFold/RNAfold | grep \"=> /\" | awk '{print $3}' | xargs -I '{}' cp -v '{}' layers/sharedObjects"

      - name: CDK Synth
        run: cdk synth
        working-directory: aws

      - name: CDK Destroy
        run: |
          cdk destroy \
            --force \
            -c name=${{ vars.AWS_STACK_NAME }}
        working-directory: aws
